# board-base.cfg — ECU1270 U-Boot platform baseline (ALWAYS applied, RAUC-agnostic).

# --- Normal boot default (overridden by rauc_env.cfg when RAUC_ENABLED=1) ---
CONFIG_BOOTCOMMAND="run normal_bootcmd;"

# --- env storage (FAT uboot.env on boot partition) ---
# CONFIG_ENV_IS_NOWHERE is not set
CONFIG_ENV_IS_IN_FAT=y
CONFIG_ENV_FAT_INTERFACE="mmc"
CONFIG_ENV_FAT_DEVICE_AND_PART=":auto"
CONFIG_ENV_FAT_FILE="uboot.env"
CONFIG_SYS_MMC_ENV_DEV=0
CONFIG_SYS_MMC_ENV_PART=0

# --- autoboot escape hatch ---
CONFIG_BOOTDELAY=1
CONFIG_AUTOBOOT_KEYED=y
CONFIG_AUTOBOOT_PROMPT="Press ENTER to stop autoboot in %d seconds\n"
CONFIG_AUTOBOOT_STOP_STR="\x0d"
CONFIG_BOOT_MMC_DEV_0=y

# --- HANDOFF / bloblist (dynamic boot-device detection dependency) ---
CONFIG_BLOBLIST=y
CONFIG_SPL_BLOBLIST=y
CONFIG_BLOBLIST_FIXED=y
# CONFIG_BLOBLIST_ALLOC is not set
CONFIG_BLOBLIST_ADDR=0x84000000
CONFIG_BLOBLIST_SIZE=0x400
CONFIG_BLOBLIST_SIZE_RELOC=0x400
CONFIG_SPL_BLOBLIST_FIXED=y
# CONFIG_SPL_BLOBLIST_ALLOC is not set
CONFIG_HANDOFF=y
CONFIG_SPL_HANDOFF=y

# --- USB host / GPIO ---
CONFIG_CMD_GPIO_READ=y
CONFIG_USB_HOST=y
CONFIG_USB_CDNS3=y
CONFIG_USB_CDNS3_TI=y
CONFIG_SPL_USB_CDNS3_HOST=y
CONFIG_USB_CDNS3_HOST=y
# CONFIG_USB_CDNS3_GADGET is not set
# CONFIG_SPL_USB_CDNS3_GADGET is not set
# CONFIG_USB_DWC3 is not set
# CONFIG_USB_DWC3_GENERIC is not set
# CONFIG_USB_DWC3_AM62 is not set
# CONFIG_SPL_USB_DWC3_GENERIC is not set
# CONFIG_SPL_USB_DWC3_AM62 is not set
# CONFIG_USB_GADGET is not set
# CONFIG_SPL_USB_GADGET is not set
# CONFIG_DM_USB_GADGET is not set
# CONFIG_SPL_DM_USB_GADGET is not set